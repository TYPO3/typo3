e2e install playwright php 8.2 pre-merge:
  stage: main
  tags:
    - metal2
  except:
    refs:
      - schedules
      - main
  artifacts:
    when: on_failure
    paths:
      - typo3temp/var/tests/playwright-install-composer/var/log
      - typo3temp/var/tests/playwright-reports
  script:
    - Build/Scripts/runTests.sh -s composerInstall -p 8.2
    - Build/Scripts/runTests.sh -s e2e-install -d mariadb -i 10.4 -p 8.2
    - Build/Scripts/runTests.sh -s e2e-install -d mysql -i 8.0 -p 8.2
    - Build/Scripts/runTests.sh -s e2e-install -d postgres -i 10 -p 8.2
    - Build/Scripts/runTests.sh -s e2e-install -d sqlite -p 8.2
