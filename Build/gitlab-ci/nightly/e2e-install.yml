e2e install playwright php 8.5 max:
  stage: acceptance
  tags:
    - metal2
  needs: []
  only:
    - schedules
  artifacts:
    when: on_failure
    paths:
      - typo3temp/var/tests/playwright-install-composer/var/log
      - typo3temp/var/tests/playwright-reports
  script:
    - Build/Scripts/runTests.sh -s composerInstallMax -p 8.5
    - Build/Scripts/runTests.sh -s e2e-install -d mariadb -i 10.10 -p 8.5
    - Build/Scripts/runTests.sh -s e2e-install -d mysql -i 8.0 -p 8.5
    - Build/Scripts/runTests.sh -s e2e-install -d postgres -i 15 -p 8.5
    - Build/Scripts/runTests.sh -s e2e-install -d sqlite -p 8.5

